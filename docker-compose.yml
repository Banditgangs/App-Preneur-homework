version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: nexus_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 
      POSTGRES_DB: nexusosint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: always
    ports:
      - "6379:6379"
  backend:
    build: 
      context: ./backend
    container_name: nexus_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL={DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - db
      - redis
  worker:
    build: 
      context: ./backend
    container_name: nexus_worker
    restart: always
    command: celery -A workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:supersecretpassword@db:5432/nexusosint
      - REDIS_URL=redis://redis:6379/0
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - db
      - redis
      - backend
  frontend:
    build:
      context: ./frontend
    container_name: nexus_ui
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
volumes:
  postgres_data:
